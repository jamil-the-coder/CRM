name: Deploy to Azure App Service

# DISABLED (manual-trigger only) — the app currently deploys via Vercel's own
# GitHub integration on the free-tier stack described in DEPLOY.md, not this
# workflow. This file is kept ready for the Azure migration described in
# DEPLOY-AZURE.md: once that migration starts, re-add `push: branches: [main]`
# below to make it deploy automatically again, and add the
# AZURE_WEBAPP_PUBLISH_PROFILE secret in this repo's GitHub settings
# (Settings → Secrets and variables → Actions) first, or this will fail at
# the "Deploy to Azure" step.

on:
  workflow_dispatch: {}

env:
  AZURE_WEBAPP_NAME: your-crm-app-name # operator: set this to your actual App Service name

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

      # Next.js "standalone" output doesn't bundle public/ or .next/static —
      # copy them alongside the standalone server before packaging.
      - run: |
          cp -r public .next/standalone/public
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static

      - uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .next/standalone
